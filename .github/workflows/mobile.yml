name: Mobile

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'app/**'
      - 'src/**'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'app.json'
      - 'babel.config.js'
      - 'metro.config.js'
      - 'jest.config.js'
      - 'jest.setup.js'

jobs:
  mobile:
    name: Mobile app · typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
